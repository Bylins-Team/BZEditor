33:
  zone: 1
  name: '&WПокои Свентовита&n'
  description: |-
    ___Узкий скальный карниз где-то на отвесном горном склоне, почти у самой вершины.
    Вокруг вздыбились бесчисленные хребты и пики, блистающие вечными снегами. Из-под края
