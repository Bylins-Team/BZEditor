    dative: Марье
    accusative: Марью
    instrumental: Марьей
    prepositional: Марьи
  descriptions:
    short_desc: |-
      Марья Соловьевна, богатырница грозная, стоит здесь.
    long_desc: |-
      Перед вами стоит Марья, дочь Соловья-разбойника. У нее длинные волосы заплетены
      в косу, но они все растрепались и повыскакивали из прически, сразу видно, что
      она сильно торопилась вступить с вами в бой. Марья стоит, запыхавшись, но
      с уверенностью сжимает в руках свое оружие и полна готовности сразиться с вами.
