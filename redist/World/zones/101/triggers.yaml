6:
  name: <101 - Petushok "Take diamond"
  attach_type: kRoomTrigger
  trigger_types:
  - kCommand
  narg: 0
  arglist: вырвать выдрать выковырять достать
  script: |-
    if (%actor.vnum% != -1)
      halt
    end
    if !(%arg.contains(камень)%) && !(%arg.contains(самоцвет)%)
      halt
    end
    if !%exist.obj(10100)%
      halt
    end
    wait 1
    calcuid Petushok 10100 obj
    wpurge %Petushok%
    wload mob 10101
    calcuid Petushok 10101 mob
    wforce %Petushok% attack %actor.name

