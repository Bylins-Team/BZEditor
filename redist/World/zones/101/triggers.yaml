# Triggers for zone 101

0:
  name: <101 - Marja killed
  attach_type: kMobTrigger
  trigger_types:
  - kDeath
  narg: 100
  script: |-
    mload   obj 10111
    calcuid Temnica 10125 room
    attach  10108 %Temnica.id%
    if (%world.curobjs(10101)% < 10) && (%random.1000% <= 50)
      mload obj 10101
    end
    if (%world.curobjs(10108)% < 10) && (%random.1000% <= 50)
      mload obj 10108
    end
    if (%world.curobjs(558)% < %world.maxobj(558)%) && (%random.1000% <= 100)
      mload obj 558
    end
    if (%world.curobjs(529)% < %world.maxobj(529)%) && (%random.1000% <= 50)
      mload obj 529
    end

