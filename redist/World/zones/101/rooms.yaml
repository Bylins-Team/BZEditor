# Rooms for zone 101

0:
  zone: 101
  name: На дороге
  description: |2-
       Вы стоите на дороге, которая ведет к дому Соловья-разбойника. Дорога под
    ногами наезжена, видно Соловей со своими сыновьями частенько выезжают на свой
    промысел.
  sector: kField
  exits:
  - direction: north
    exit_flags: 0
    key: -1
    to_room: 10050
    lock_complexity: 0
  - direction: east
    exit_flags: 0
    key: -1
    to_room: 10101
    lock_complexity: 0
  triggers:
  - 10120

1:
  zone: 101
  name: Перед воротами
  description: |2-
       Вы стоите перед дубовыми воротами. Ворота все железом окованы, а петли у тех
    ворот булатные. Все это не для красоты, а для крепости сделано.
  sector: kField
  exits:
  - direction: east
    keywords: ворота
    exit_flags: 1
    key: -1
    to_room: 10102
    lock_complexity: 0
  - direction: west
    exit_flags: 0
    key: -1
    to_room: 10100
    lock_complexity: 0

2:
  zone: 101
  name: На широком дворе
  description: |2-
       Вы вошли на широкий двор. Перед вами постройка-строеньице. Крыша-кровля
    узорно обделана, на крыше, на столбике петушок вырезан, на окошках резные
    наличники. Это дом Соловья-разбойника.
  sector: kCity
  exits:
  - direction: north
    exit_flags: 0
    key: -1
    to_room: 10103
    lock_complexity: 0
  - direction: south
    exit_flags: 0
    key: -1
    to_room: 10104
    lock_complexity: 0
  - direction: west
    keywords: ворота
    exit_flags: 1
    key: -1
    to_room: 10101
    lock_complexity: 0

3:
  zone: 101
  name: На широком дворе
  description: |2-
       Вы стоите на широком дворе, с западной стороны забор высокий. С восточной
    стороны дом Соловья и его семейства.
  sector: kCity
  exits:
  - direction: south
    exit_flags: 0
    key: -1
    to_room: 10102
    lock_complexity: 0

4:
  zone: 101
  name: На широком дворе
  description: |2-
       Вы подошли к углу дома, за поворотом должен быть вход в хоромы. С южной
    стороны виден сад.
  sector: kCity
  exits:
