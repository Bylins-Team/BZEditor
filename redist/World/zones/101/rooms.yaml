  - direction: south
    exit_flags: 0
    key: -1
    to_room: 10134
    lock_complexity: 0

5:
  zone: 101
  name: В оружейной
  description: |2-
       Вы вошли в комнату и не поверили своим глазам. Все ее стены увешаны разным
    оружием. На полу постелен мягкий ковер и на нем тоже разложено оружие, которому
    не хватило места на стенах.
  sector: kInside
  exits:
